<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom-like Raycaster</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <!-- HUD Touch Controls -->
        <div id="hud">
            <!-- D-Pad Left -->
            <div id="dpad">
                <button id="btnUp" class="dpad-btn dpad-up">▲</button>
                <button id="btnLeft" class="dpad-btn dpad-left">◄</button>
                <button id="btnDown" class="dpad-btn dpad-down">▼</button>
                <button id="btnRight" class="dpad-btn dpad-right">►</button>
            </div>
            
            <!-- Action Buttons Right -->
            <div id="actionButtons">
                <button id="btnShoot" class="action-btn shoot-btn">SHOOT</button>
            </div>
        </div>
    </div>

    <script src="src/config.js"></script>
    <script src="src/map.js"></script>
    <script src="src/player.js"></script>
    <script src="src/renderer.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
