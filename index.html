<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doom 3D Mobile</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <!-- D-pad sinistra: movimento + rotazione -->
        <div id="dpad">
            <button id="btnUp" class="dpad-btn">▲</button>
            <button id="btnDown" class="dpad-btn">▼</button>
            <button id="btnLeft" class="dpad-btn">◄</button>
            <button id="btnRight" class="dpad-btn">►</button>
        </div>
        
        <!-- Strafe destra -->
        <div id="strafeButtons">
            <button id="btnStrafeL" class="strafe-btn">◀ STRAFE</button>
            <button id="btnStrafeR" class="strafe-btn">STRAFE ▶</button>
        </div>
    </div>

    <script src="src/level.js"></script>
    <script src="src/game.js"></script>
</body>
</html>
