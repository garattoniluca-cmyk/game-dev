<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
</head>
<body>
    <h1>Test JavaScript</h1>
    <canvas id="testCanvas" width="400" height="300" style="border: 1px solid white; background: black;"></canvas>
    
    <script>
        const canvas = document.getElementById('testCanvas');
        const ctx = canvas.getContext('2d');
        
        console.log('Canvas OK');
        
        ctx.fillStyle = '#00FF00';
        ctx.fillRect(50, 50, 100, 100);
        
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '20px Arial';
        ctx.fillText('If you see green rectangle, JS works!', 50, 250);
    </script>
</body>
</html>
